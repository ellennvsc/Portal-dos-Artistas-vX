        <header class="site-header d-flex flex-column justify-content-center align-items-center">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 col-12 text-center">
                        <h2 class="mb-0">Inscrição</h2>
                    </div>
                </div>
            </div>
        </header>

        <section class="section-padding" id="section_2">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5 col-12 pe-lg-5">
                        <div class="contact-info">
                            <h3 class="mb-4">Vamos começar sua inscrição!</h3>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="contact-section section-padding pt-0">
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 col-12 mx-auto">
                        <div class="section-title-wrap mb-5">
                            <h4 class="section-title">Formulário de inscrição.</h4>
                        </div>

                        <form id="inscricaoForm" action="ingressos.html" method="post" class="custom-form contact-form" role="form">
                            <div class="row">
                                <div class="col-lg-6 col-md-6 col-12">
                                    <div class="form-floating">
                                        <input type="text" name="cpf" id="cpf" class="form-control" placeholder="CPF" required="">
                                        <label for="cpf">CPF</label>
                                    </div>
                                </div>

                                <div class="col-lg-6 col-md-6 col-12">
                                    <div class="form-floating">
                                        <input type="email" name="email" id="email" pattern="[^ @]*@[^ @]*" class="form-control" placeholder="Email" required="">
                                        <label for="email">Email</label>
                                    </div>
                                </div>

                                <div class="form-floating">
                                    <select name="evento" id="evento" class="form-control" required="">
                                        <!-- Os eventos serão carregados aqui via JavaScript -->
                                    </select>
                                    <label for="evento">Escolha o evento</label>
                                </div>

                                <div class="col-lg-12 col-12 mt-4">
                                    <div class="payment-methods">
                                        <h4>Método de pagamento:</h4>
                                        <div>
                                            <input type="radio" id="pagamento-cartao" name="pagamento" value="cartao" required>
                                            <label for="pagamento-cartao">Cartão de Crédito/Débito</label>
                                        </div>
                                        <div>
                                            <input type="radio" id="pagamento-pix" name="pagamento" value="pix">
                                            <label for="pagamento-pix">Pix</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="payment-fields" id="campos-cartao">
                                    <h5>Informações do Cartão:</h5>
                                    <div class="form-floating mb-3">
                                        <input type="text" name="numero-cartao" id="numero-cartao" class="form-control" placeholder="Número do Cartão" pattern="\d{16}" required="">
                                        <label for="numero-cartao">Número do Cartão</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="text" name="nome-cartao" id="nome-cartao" class="form-control" placeholder="Nome no Cartão" required="">
                                        <label for="nome-cartao">Nome no Cartão</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="text" name="validade-cartao" id="validade-cartao" class="form-control" placeholder="Validade (MM/AA)" pattern="\d{2}/\d{2}" required="">
                                        <label for="validade-cartao">Validade (MM/AA)</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="text" name="cvv-cartao" id="cvv-cartao" class="form-control" placeholder="CVV" pattern="\d{3}" required="">
                                        <label for="cvv-cartao">CVV</label>
                                    </div>
                                </div>

                                <div class="payment-fields" id="campos-pix">
                                    <h5>Informações do Pix:</h5>
                                    <div class="form-floating mb-3">
                                        <input type="text" name="chave-pix" id="chave-pix" class="form-control" placeholder="Chave Pix" required="">
                                        <label for="chave-pix">Chave Pix</label>
                                    </div>
                                </div>

                                <div class="col-lg-4 col-12 ms-auto">
                                    <button type="submit" class="form-control">Enviar</button>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">

                </div>
