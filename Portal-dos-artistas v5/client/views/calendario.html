    <style>
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            border: 1px solid #ddd;
            margin-top: 20px;
        }

        .calendar div {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .calendar .header {
            font-weight: bold;
            background-color: #f4f4f4;
        }

        .calendar .day {
            background-color: #fff;
            cursor: pointer;
            position: relative;
            transition: background-color 0.3s ease;
        }

        .calendar .day:hover {
            background-color: #e0e0e0;
        }

        .calendar .day:nth-child(7n+1) {
            color: red;
        }

        .calendar .day:nth-child(7n) {
            color: blue;
        }

        .calendar .empty {
            background-color: #f9f9f9;
        }

        .calendar .event {
            background-color: #007bff;
            color: white;
            border-radius: 3px;
            padding: 2px 5px;
            margin: 2px;
            font-size: 0.8em;
            position: absolute;
            bottom: 5px;
            left: 5px;
            right: 5px;
        }

        .calendar-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .calendar-navigation button {
            border: none;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 3px;
        }

        .calendar-navigation button:hover {
            background-color: #0056b3;
        }

        .event-details {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 3px;
            background-color: #f9f9f9;
        }

        .event-details h3 {
            margin-top: 0;
        }

        .event-details img {
            max-width: 100%;
            height: auto;
            border-radius: 3px;
        }
    </style>
</head>
